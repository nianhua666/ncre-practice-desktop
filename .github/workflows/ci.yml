name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Generate seed banks
        run: python .\scripts\generate_seed_banks.py
      - name: Run Python tests
        run: python -m unittest .\tests\smoke_test.py .\tests\test_ai_provider.py
      - name: Check frontend syntax
        run: node --check .\frontend\app.js
